name: Publish package

on:
  push:
    tags:
      - "*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false  # never use caching in release builds

      - name: Verify tag points to main and matches package version
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION_FROM_TAG="${TAG_NAME#v}"
          VERSION_FROM_PACKAGE="$(node -p "require('./package.json').version")"

          echo "Tag: ${TAG_NAME}"
          echo "Version from package.json: ${VERSION_FROM_PACKAGE}"

          if [[ "${VERSION_FROM_TAG}" != "${VERSION_FROM_PACKAGE}" ]]; then
            echo "Tag version '${VERSION_FROM_TAG}' does not match package.json version '${VERSION_FROM_PACKAGE}'."
            exit 1
          fi

          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag commit ${GITHUB_SHA} is not on main branch."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public
